<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vidaura</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #020617);
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* HEADER */
header {
    padding: 20px 40px;
}

.logo {
    font-size: 26px;
    font-weight: bold;
    color: #38bdf8;
}

/* MAIN CONTAINER */
.container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 35px;
    width: 100%;
    max-width: 600px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

h1 {
    font-size: 30px;
    margin-bottom: 10px;
}

p {
    color: #94a3b8;
    margin-bottom: 25px;
}

/* INPUT */
input {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    outline: none;
    margin-bottom: 15px;
    font-size: 16px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(90deg, #38bdf8, #0ea5e9);
    color: #000;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.03);
}

/* VIDEO SECTION */
.preview {
    margin-top: 25px;
}

.preview img {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 15px;
}

video {
    width: 100%;
    border-radius: 12px;
    margin-bottom: 20px;
}

/* DOWNLOAD GRID */
.download-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
}

.download-grid button {
    padding: 10px;
    font-size: 14px;
}

/* LOADING SPINNER */
.loader {
    display: none;
    margin-top: 15px;
}

.loader div {
    width: 25px;
    height: 25px;
    border: 3px solid #38bdf8;
    border-top: 3px solid transparent;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: auto;
}

@keyframes spin {
    to {transform: rotate(360deg);}
}

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
    font-size: 14px;
    color: #64748b;
}

/* MOBILE */
@media (max-width: 600px) {
    .card {
        padding: 20px;
    }

    h1 {
        font-size: 24px;
    }
}
</style>
</head>

<body>

<header>
    <div class="logo">Vidaura</div>
</header>

<div class="container">
    <div class="card">

        <h1>Download YouTube Videos</h1>
        <p>Fast, simple, and powerful video & audio downloader</p>

        <form method="POST" onsubmit="showLoader()">
            <input type="text" name="url" placeholder="Paste YouTube URL here..." required>
            <button type="submit">Fetch</button>
        </form>

        <!-- Loader -->
        <div class="loader" id="loader">
            <div></div>
        </div>

        {% if data %}
        <div class="preview">
            <h3>{{data.title}}</h3>

            <img src="{{ data.thumbnail }}" alt="thumbnail">

            <video controls>
                <source src="{{ data.formats[0].url }}" type="video/mp4">
            </video>

            <h3>Download Options</h3>

            <div class="download-grid">
                {% for format in data.formats %}
                <form action="/download" method="POST">
                    <input type="hidden" name="url" value="{{request.form.url}}">
                    <input type="hidden" name="format_id" value="{{format.format_id}}">
                    <button type="submit">
                        {{format.resolution or format.ext}}
                    </button>
                </form>
                {% endfor %}
            </div>
        </div>
        {% endif %}

    </div>
</div>

<footer>
    © 2026 Vidaura
</footer>

<script>
function showLoader() {
    document.getElementById("loader").style.display = "block";
}
</script>

</body>
</html>
